<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f3f4f6; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); padding: 2rem; width: 100%; max-width: 400px; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
        .error { background: #fee2e2; color: #991b1b; border-radius: 4px; padding: .75rem; margin-bottom: 1rem; text-align: center; }
        label { display: block; font-weight: 500; margin-bottom: .25rem; }
        input[type=text], input[type=password] { width: 100%; padding: .5rem .75rem; border: 1px solid #d1d5db; border-radius: 4px; margin-bottom: 1rem; font-size: 1rem; }
        button { width: 100%; padding: .6rem; background: #2563eb; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .link { text-align: center; margin-top: 1rem; }
        .link a { color: #2563eb; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Create Account</h1>
        {#if errorMessage}
        <div class="error">{errorMessage}</div>
        {/if}
        <form action="/register" method="POST">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6">

            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6">

            <button type="submit">Register</button>
        </form>
        <div class="link">
            <a href="/login">Already have an account? Sign in</a>
        </div>
    </div>
</body>
</html>
